<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Portfolio</title>
        <link rel="stylesheet" href="src/style.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
    </head>
    <body class="bg-gray-800 text-white">
        <header class="bg-indigo-500/50 p-6 max-sm:w-full max-sm:p-4">
            <div class="container">
                <a
                    href="#"
                    class="logo font-bold text-2xl border-2 rounded-full px-3 py-2 cursor-pointer hover:bg-indigo-900 transition-colors duration-200 ease-in-out max-sm:mb-4"
                    >M</a
                >
                <nav class="flex gap-7">
                    <a
                        class="border-b-2 border-transparent hover:border-b-2 hover:border-white transition-colors duration-200 ease-in-out"
                        href="#"
                        >Home</a
                    >
                    <a
                        class="border-b-2 border-transparent hover:border-b-2 hover:border-white transition-colors duration-200 ease-in-out"
                        href="#"
                        >About</a
                    >
                    <a
                        class="border-b-2 border-transparent hover:border-b-2 hover:border-white transition-colors duration-200 ease-in-out"
                        href="#"
                        >Projects</a
                    >
                    <a
                        class="border-b-2 border-transparent hover:border-b-2 hover:border-white transition-colors duration-200 ease-in-out"
                        href="#"
                        >Contact</a
                    >
                </nav>
                <div class="buttons flex gap-5">
                    <button
                        class="px-3 py-1 bg-indigo-400 rounded-md cursor-pointer hover:bg-indigo-800 transition-colors duration-200 ease-in-out max-sm:hidden"
                    >
                        Login
                    </button>
                    <button
                        class="px-3 py-1 bg-indigo-400 rounded-md cursor-pointer hover:bg-indigo-800 transition-colors duration-200 ease-in-out max-sm:hidden"
                    >
                        Register
                    </button>
                </div>
            </div>
        </header>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
